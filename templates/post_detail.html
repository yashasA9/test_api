{% extends "base.html" %}

{% block content %}

<div class="card">
    <img src="{{ post.image }}">
    <h2>{{ post.title }}</h2>
    <p>{{ post.body }}</p>
</div>

<h3>Comments</h3>

{% for comment in comments %}
<div class="card">
    <strong>{{ comment.name }}</strong>
    <p>{{ comment.body }}</p>
    <small>{{ comment.email }}</small>
</div>
{% endfor %}

{% endblock %}
