<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flask Blog</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            overflow-x: hidden;
            color: black;
        }

        /* Canvas background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        nav {
            padding: 15px;
        }

        nav a {
            margin-right: 20px;
            color: grey;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body data-theme="dark">

<canvas id="dotCanvas"></canvas>

<nav>
    <a href="/">Home</a>
    <a href="/posts">Posts</a>
    <a href="/comments">Comments</a>

    
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="/static/dotgrid.js"></script>
<script src="/static/theme.js"></script>

</body>
</html>
